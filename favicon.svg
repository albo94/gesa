<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Bordo esterno verde scuro (logo GESA) -->
  <circle cx="50" cy="50" r="49" fill="#1b563f"/>
  <!-- Riempimento verde lime (logo GESA) -->
  <circle cx="50" cy="50" r="42" fill="#a6c539"/>
  <!-- Sole giallo -->
  <circle cx="50" cy="36" r="13" fill="#fff101"/>
  <!-- Montagna grigia -->
  <polygon points="50,16 28,50 72,50" fill="#c2c3c6"/>
  <polygon points="50,20 36,44 64,44" fill="#dcdde0"/>
  <!-- Neve -->
  <polygon points="44,26 50,16 56,26 50,30" fill="white"/>
  <!-- Testo GESA -->
  <text x="50" y="63" text-anchor="middle" font-family="Arial Black,Arial,sans-serif"
        font-size="17" font-weight="900" fill="#231f20" letter-spacing="0.5">GESA</text>
  <!-- Corda gialla (semplificata) -->
  <path d="M28,75 Q50,68 72,75" fill="none" stroke="#fff101" stroke-width="5" stroke-linecap="round"/>
  <path d="M32,80 Q42,87 50,80 Q58,73 68,80" fill="none" stroke="#fff101" stroke-width="4.5" stroke-linecap="round"/>
</svg>
